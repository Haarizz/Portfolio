<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Harikrishnan T Nair — Software Engineer | System Map</title>
<meta name="description" content="Harikrishnan T Nair (HAARIZZ) — Software Engineer. An interactive system-architecture map of my work. Pan, zoom, and click the nodes." />
<meta name="author" content="Harikrishnan T Nair" />

<meta property="og:title" content="Harikrishnan T Nair — Software Engineer" />
<meta property="og:description" content="An interactive system-architecture map. Pan, zoom & click nodes. Java · Spring Boot · React · PostgreSQL." />

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='14' fill='%2305060f'/%3E%3Ctext x='50' y='72' font-family='monospace' font-size='60' font-weight='bold' text-anchor='middle' fill='%2300e5ff'%3EH%3C/text%3E%3C/svg%3E" />
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
tailwind.config = { theme: { extend: {
    colors: { bg:'#05060f', panel:'#0b0e1f', cyan:'#00e5ff', magenta:'#ff2bd6', dim:'#6b7394', edge:'#1b2142' },
    fontFamily: { sans:['Space Grotesk','sans-serif'], mono:['JetBrains Mono','monospace'] }
}}}
</script>
<style>
    html,body { height:100%; }
    body { font-family:'Space Grotesk',sans-serif; background:#05060f; color:#cfd6f5; overflow:hidden; }
    /* neon grid floor */
    #grid { position:fixed; inset:0; z-index:0; background-image:
        linear-gradient(rgba(0,229,255,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.06) 1px, transparent 1px);
        background-size:48px 48px; }
    #vignette { position:fixed; inset:0; z-index:1; pointer-events:none; box-shadow: inset 0 0 240px rgba(0,0,0,0.95);
        background: radial-gradient(circle at 50% 40%, rgba(0,229,255,0.06), transparent 60%); }
    .glass { background:rgba(11,14,31,0.72); border:1px solid rgba(0,229,255,0.18); backdrop-filter:blur(10px); }
    .node { position:absolute; transform:translate(-50%,-50%); cursor:pointer; user-select:none;
        transition: filter .2s, box-shadow .2s; }
    .node:hover { filter:brightness(1.25); }
    .node .chip { border:1px solid; border-radius:12px; padding:10px 14px; white-space:nowrap;
        display:flex; align-items:center; gap:8px; font-weight:600; font-size:13px; box-shadow:0 0 18px rgba(0,0,0,.5); }
    .node.cyan .chip { border-color:#00e5ff; color:#dffaff; box-shadow:0 0 20px rgba(0,229,255,.25); background:rgba(0,229,255,.06); }
    .node.magenta .chip { border-color:#ff2bd6; color:#ffe1fb; box-shadow:0 0 20px rgba(255,43,214,.25); background:rgba(255,43,214,.06); }
    .node.proj .chip { border-style:dashed; }
    .node.pulse .chip { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{ box-shadow:0 0 14px rgba(0,229,255,.2);} 50%{ box-shadow:0 0 30px rgba(0,229,255,.55);} }
    .dot { animation: flow var(--dur,3s) linear infinite; }
    @keyframes flow { from { offset-distance:0%; } to { offset-distance:100%; } }
    .reveal { transition: opacity .5s, transform .5s; }
    .scroll::-webkit-scrollbar{width:6px;} .scroll::-webkit-scrollbar-thumb{background:#1b2142;border-radius:6px;}
    @media (prefers-reduced-motion: reduce){ .node.pulse .chip{animation:none;} .dot{animation:none; opacity:0;} }
</style>
</head>
<body>
<div id="grid"></div>
<div id="vignette"></div>

<!-- top bar -->
<header class="fixed top-0 left-0 right-0 z-30 glass border-b border-edge">
    <div class="px-5 h-14 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-cyan">hub</span>
            <div class="leading-tight">
                <p class="font-bold tracking-wide">HARIKRISHNAN T NAIR</p>
                <p class="text-dim text-xs font-mono">Software Engineer · system architecture map</p>
            </div>
        </div>
        <div class="flex items-center gap-2 text-sm">
            <button id="btnFit" class="glass px-3 py-1.5 rounded hover:text-cyan" title="Reset view">⤢ fit</button>
            <a href="Harikrishnan-T-Nair-Resume.pdf" download class="border border-cyan/40 text-cyan px-3 py-1.5 rounded hover:bg-cyan/10">resume</a>
        </div>
    </div>
</header>

<!-- hint -->
<div class="fixed bottom-4 left-1/2 -translate-x-1/2 z-30 glass px-4 py-2 rounded-full text-xs text-dim font-mono">
    drag to pan · scroll to zoom · <span class="text-cyan">click a node</span> to inspect
</div>

<!-- legend -->
<div class="fixed bottom-4 left-4 z-30 glass px-4 py-3 rounded-lg text-xs space-y-1.5 hidden md:block">
    <p class="flex items-center gap-2"><span class="w-3 h-3 rounded border border-cyan bg-cyan/10"></span> core / infra</p>
    <p class="flex items-center gap-2"><span class="w-3 h-3 rounded border border-magenta bg-magenta/10"></span> domain module</p>
    <p class="flex items-center gap-2"><span class="w-3 h-3 rounded border border-cyan border-dashed"></span> project (clickable)</p>
</div>

<!-- viewport -->
<div id="viewport" class="fixed inset-0 z-10 cursor-grab">
    <svg id="edges" class="absolute inset-0 w-full h-full pointer-events-none" style="overflow:visible"></svg>
    <div id="world" class="absolute left-0 top-0" style="transform-origin:0 0;"></div>
</div>

<!-- inspector panel -->
<aside id="panel" class="fixed top-16 right-4 z-30 w-[330px] max-w-[88vw] glass rounded-xl p-5 translate-x-[120%] transition-transform duration-300 scroll" style="max-height:80vh; overflow:auto;">
    <button id="panelClose" class="absolute top-3 right-3 text-dim hover:text-magenta material-symbols-outlined">close</button>
    <div id="panelBody"></div>
</aside>

<script>
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ===== GRAPH MODEL ===== */
// positions in world coordinates
const NODES = [
    { id:'me',    label:'Harikrishnan · Software Engineer', icon:'person', type:'cyan', x:600, y:90, pulse:true,
      detail:{ title:'Harikrishnan T Nair', sub:'Software Engineer @ GEEBU InfoTech',
        body:'I architect and build backend systems for real businesses — ERP platforms where inventory, finance and payroll meet clean engineering. This map shows how the pieces of my work connect.',
        meta:['Kollam, India · Remote','B.Tech CSE · CGPA 8.01','Java · Spring Boot · React · PostgreSQL'] } },

    { id:'frontend', label:'React Frontend', icon:'monitor', type:'cyan', x:300, y:250,
      detail:{ title:'Frontend Layer', sub:'React · Vite · JavaScript / TypeScript',
        body:'Module-driven dashboards and branch-aware UIs that talk to the backend over REST.', meta:['React','Vite','Tailwind','TypeScript'] } },
    { id:'api', label:'Spring Boot API', icon:'dns', type:'cyan', x:600, y:250, pulse:true,
      detail:{ title:'Application / API Layer', sub:'Spring Boot · REST · layered service-repository',
        body:'The core engine: layered service/repository design, role-based access control and a clean REST surface that every module shares.', meta:['Spring Boot','Hibernate','REST API','RBAC'] } },
    { id:'db', label:'PostgreSQL', icon:'database', type:'cyan', x:600, y:430,
      detail:{ title:'Data Layer', sub:'PostgreSQL · MySQL · relational modelling',
        body:'A single consistent relational model underpinning every module — the source of truth across branches.', meta:['PostgreSQL','MySQL','Query Optimization','DB Design'] } },

    // domain modules
    { id:'inv', label:'Inventory', icon:'inventory_2', type:'magenta', x:880, y:200 },
    { id:'sales', label:'Sales & Purchase', icon:'receipt_long', type:'magenta', x:920, y:320 },
    { id:'fin', label:'Financial Accounting', icon:'account_balance', type:'magenta', x:880, y:440 },
    { id:'pay', label:'Payroll', icon:'payments', type:'magenta', x:780, y:520 },

    // projects (clickable, dashed)
    { id:'billbull', label:'BillBull ERP', icon:'hub', type:'cyan', cls:'proj', x:600, y:610,
      detail:{ title:'BillBull ERP', sub:'Enterprise SaaS · [live] · 387+ commits',
        body:'Production multi-branch ERP unifying inventory, financial accounting, sales, purchase and payroll on one data model. My primary work at GEEBU.',
        meta:['Spring Boot','React','PostgreSQL','TypeScript'], url:'https://github.com/Haarizz/Billbull_Retail' } },
    { id:'inventory', label:'inventory-registries', icon:'database', type:'cyan', cls:'proj', x:300, y:430,
      detail:{ title:'inventory-registries', sub:'Full-Stack · [oss]',
        body:'Full-stack inventory & registries system — React (Vite) front end + Spring Boot API for tracking stock and records.',
        meta:['React','Vite','Spring Boot'], url:'https://github.com/Haarizz/inventory-registries' } },
    { id:'ai', label:'Blood Cancer Detection', icon:'biotech', type:'magenta', cls:'proj', x:300, y:610,
      detail:{ title:'Blood Cancer Detection', sub:'AI / ML · final-year research',
        body:'Deep-learning + image-processing pipeline detecting early signs of blood cancer from medical images.',
        meta:['Python','Deep Learning','Image Processing'], url:null } },
    { id:'jobx', label:'JobXplore', icon:'work', type:'cyan', cls:'proj', x:120, y:250,
      detail:{ title:'JobXplore', sub:'Web App · [oss]',
        body:'A job portal matching people to roles by skills, with apply & tracking.',
        meta:['Java','Full-Stack'], url:'https://github.com/Haarizz/JOBPORTAL' } },

    { id:'contact', label:'Contact / Hire', icon:'alternate_email', type:'magenta', cls:'proj', x:380, y:90, pulse:true,
      detail:{ title:'Let\'s build something', sub:'Open to full-time roles & serious engineering work',
        body:'Reach me directly — I respond fast.',
        contact:true,
        meta:['Kollam, India · Remote'] } },
];
const EDGES = [
    ['me','api'], ['me','frontend'], ['frontend','api'], ['api','db'],
    ['api','inv'], ['api','sales'], ['api','fin'], ['api','pay'],
    ['api','billbull'], ['db','billbull'],
    ['frontend','inventory'], ['inventory','ai'], ['frontend','jobx'],
    ['me','contact'],
];

/* ===== RENDER NODES ===== */
const world = document.getElementById('world');
const svg = document.getElementById('edges');
const NODE_BY = {};
NODES.forEach(n => {
    NODE_BY[n.id] = n;
    const d = document.createElement('div');
    d.className = `node ${n.type} ${n.cls||''} ${n.pulse?'pulse':''}`;
    d.style.left = n.x+'px'; d.style.top = n.y+'px';
    d.dataset.id = n.id;
    d.innerHTML = `<div class="chip"><span class="material-symbols-outlined text-[18px]">${n.icon}</span>${n.label}${n.cls==='proj'?'<span class="material-symbols-outlined text-[16px] opacity-60">open_in_full</span>':''}</div>`;
    world.appendChild(d);
});

/* ===== RENDER EDGES (SVG paths in world space) ===== */
const NS='http://www.w3.org/2000/svg';
function edgePath(a,b){ const mx=(a.x+b.x)/2; return `M ${a.x} ${a.y} C ${mx} ${a.y}, ${mx} ${b.y}, ${b.x} ${b.y}`; }
EDGES.forEach(([from,to],i)=>{
    const a=NODE_BY[from], b=NODE_BY[to]; if(!a||!b) return;
    const p=document.createElementNS(NS,'path');
    p.setAttribute('d', edgePath(a,b));
    p.setAttribute('fill','none');
    p.setAttribute('stroke', b.type==='magenta'||a.type==='magenta' ? 'rgba(255,43,214,0.35)' : 'rgba(0,229,255,0.35)');
    p.setAttribute('stroke-width','1.5');
    svg.appendChild(p);
    // flowing dot
    if(!reduceMotion){
        const dot=document.createElementNS(NS,'circle');
        dot.setAttribute('r','3'); dot.setAttribute('class','dot');
        dot.setAttribute('fill', b.type==='magenta'?'#ff2bd6':'#00e5ff');
        dot.style.offsetPath = `path('${edgePath(a,b)}')`;
        dot.style.setProperty('--dur', (2.4 + (i%5)*0.5)+'s');
        svg.appendChild(dot);
    }
});

/* ===== PAN / ZOOM ===== */
const viewport = document.getElementById('viewport');
let scale=1, tx=0, ty=0, dragging=false, sx=0, sy=0, moved=false;
function apply(){ const t=`translate(${tx}px,${ty}px) scale(${scale})`; world.style.transform=t; svg.style.transform=t; }
function fit(){
    const xs=NODES.map(n=>n.x), ys=NODES.map(n=>n.y);
    const minX=Math.min(...xs)-120, maxX=Math.max(...xs)+220, minY=Math.min(...ys)-100, maxY=Math.max(...ys)+100;
    const w=maxX-minX, h=maxY-minY; const vw=innerWidth, vh=innerHeight;
    scale=Math.min(vw/w, vh/h, 1.1); scale=Math.max(scale,0.35);
    tx=(vw - w*scale)/2 - minX*scale; ty=(vh - h*scale)/2 - minY*scale + 20; apply();
}
viewport.addEventListener('mousedown', e=>{ dragging=true; moved=false; sx=e.clientX-tx; sy=e.clientY-ty; viewport.style.cursor='grabbing'; });
window.addEventListener('mousemove', e=>{ if(!dragging) return; tx=e.clientX-sx; ty=e.clientY-sy; moved=true; apply(); });
window.addEventListener('mouseup', ()=>{ dragging=false; viewport.style.cursor='grab'; });
viewport.addEventListener('wheel', e=>{ e.preventDefault();
    const f=e.deltaY<0?1.12:0.89; const nx=(e.clientX-tx)/scale, ny=(e.clientY-ty)/scale;
    scale=Math.min(Math.max(scale*f,0.3),3); tx=e.clientX-nx*scale; ty=e.clientY-ny*scale; apply();
},{passive:false});
// touch pan
let lastTouch=null;
viewport.addEventListener('touchstart', e=>{ if(e.touches.length===1){ lastTouch=e.touches[0]; sx=lastTouch.clientX-tx; sy=lastTouch.clientY-ty; } },{passive:true});
viewport.addEventListener('touchmove', e=>{ if(e.touches.length===1){ const t=e.touches[0]; tx=t.clientX-sx; ty=t.clientY-sy; moved=true; apply(); } },{passive:true});
document.getElementById('btnFit').addEventListener('click', fit);
window.addEventListener('resize', ()=>{ /* keep transform */ });
fit();

/* ===== INSPECTOR ===== */
const panel=document.getElementById('panel'), panelBody=document.getElementById('panelBody');
function openNode(id){
    const n=NODE_BY[id]; if(!n||!n.detail){ return; }
    const d=n.detail;
    panelBody.innerHTML = `
        <p class="text-cyan font-mono text-xs mb-1">// node: ${n.id}</p>
        <h2 class="text-2xl font-bold mb-1">${d.title}</h2>
        <p class="text-magenta text-sm mb-4">${d.sub}</p>
        <p class="text-dim text-sm leading-relaxed mb-4">${d.body}</p>
        ${d.meta?`<div class="flex flex-wrap gap-2 mb-4">${d.meta.map(m=>`<span class="text-xs font-mono px-2 py-1 rounded border border-edge text-cyan">${m}</span>`).join('')}</div>`:''}
        ${d.contact ? `<div class="space-y-2">
            <a href="mailto:harikrishnantnair60@gmail.com" class="flex items-center gap-2 bg-cyan text-bg px-4 py-2 rounded font-bold text-sm hover:bg-magenta transition-colors"><span class="material-symbols-outlined text-base">mail</span> harikrishnantnair60@gmail.com</a>
            <a href="https://www.linkedin.com/in/harikrishnan-t-nair" target="_blank" rel="noopener" class="flex items-center gap-2 border border-edge px-4 py-2 rounded text-sm hover:border-cyan hover:text-cyan transition-colors"><span class="material-symbols-outlined text-base">work</span> LinkedIn</a>
            <a href="https://github.com/Haarizz" target="_blank" rel="noopener" class="flex items-center gap-2 border border-edge px-4 py-2 rounded text-sm hover:border-cyan hover:text-cyan transition-colors"><span class="material-symbols-outlined text-base">code</span> GitHub</a>
            <a href="tel:+919746757495" class="flex items-center gap-2 border border-edge px-4 py-2 rounded text-sm hover:border-cyan hover:text-cyan transition-colors"><span class="material-symbols-outlined text-base">call</span> +91 97467 57495</a>
          </div>`
        : d.url?`<a href="${d.url}" target="_blank" rel="noopener" class="inline-flex items-center gap-2 bg-cyan text-bg px-4 py-2 rounded font-bold text-sm hover:bg-magenta transition-colors">view repository <span class="material-symbols-outlined text-base">open_in_new</span></a>`:'<p class="text-dim text-xs font-mono">// private / research project</p>'}
    `;
    panel.style.transform='translateX(0)';
}
world.addEventListener('click', e=>{ if(moved) return; const node=e.target.closest('.node'); if(node) openNode(node.dataset.id); });
document.getElementById('panelClose').addEventListener('click', ()=>panel.style.transform='translateX(120%)');
// open intro node on load
setTimeout(()=>openNode('me'), 600);
</script>
</body>
</html>
