    <rect x="80" y="500" width="120" height="46" rx="23" fill="#0f1219" stroke="#1c2530"/><text x="140" y="530" fill="#3bf08a" text-anchor="middle">Java</text>
    <rect x="212" y="500" width="176" height="46" rx="23" fill="#0f1219" stroke="#1c2530"/><text x="300" y="530" fill="#3bf08a" text-anchor="middle">Spring Boot</text>
    <rect x="400" y="500" width="116" height="46" rx="23" fill="#0f1219" stroke="#1c2530"/><text x="458" y="530" fill="#3bf08a" text-anchor="middle">React</text>
